<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — TendRAI</title>
<link rel="stylesheet" href="/css/style.css">
<style>
body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1rem;
  background: radial-gradient(ellipse at 30% 40%, rgba(34,211,238,0.06) 0%, transparent 50%),
              radial-gradient(ellipse at 70% 80%, rgba(99,102,241,0.08) 0%, transparent 50%); }
.auth-card { width:100%; max-width:480px; padding:2.5rem; }
.auth-title { font-size:1.6rem; font-weight:800; margin-bottom:0.4rem; text-align:center; }
.auth-sub { color:var(--text-muted); font-size:0.9rem; text-align:center; margin-bottom:2rem; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
</style>
</head>
<body>
<div class="glass-card auth-card">
  <div style="text-align:center;margin-bottom:2rem">
    <a href="/" class="navbar-brand" style="justify-content:center">
      <div class="brand-logo">T</div>
      <span class="brand-name" style="margin-left:0.5rem">Tend<span>RAI</span></span>
    </a>
  </div>
  <h1 class="auth-title">Create Your Account</h1>
  <p class="auth-sub">Start your 14-day free trial. No credit card required.</p>
  <div id="error-msg" class="alert alert-error" style="display:none"></div>
  <div id="success-msg" class="alert alert-success" style="display:none"></div>
  <form id="register-form">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Full Name *</label>
        <input type="text" id="name" class="form-input" placeholder="Rajesh Kumar" required>
      </div>
      <div class="form-group">
        <label class="form-label">Company Name</label>
        <input type="text" id="company" class="form-input" placeholder="RK Constructions">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Email Address *</label>
      <input type="email" id="email" class="form-input" placeholder="you@company.com" required>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <input type="tel" id="phone" class="form-input" placeholder="+91 98765 43210">
      </div>
      <div class="form-group">
        <label class="form-label">Password *</label>
        <input type="password" id="password" class="form-input" placeholder="Min. 8 characters" required minlength="8">
      </div>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem" id="submit-btn">
      Create Free Account
    </button>
  </form>
  <p style="text-align:center;margin-top:1.5rem;font-size:0.82rem;color:var(--text-muted)">
    By registering you agree to our <a href="#" style="color:var(--accent)">Terms</a> & <a href="#" style="color:var(--accent)">Privacy Policy</a>
  </p>
  <p style="text-align:center;margin-top:0.75rem;font-size:0.88rem;color:var(--text-muted)">
    Already have an account? <a href="/login" style="color:var(--accent)">Sign in</a>
  </p>
</div>
<script src="/js/app.js"></script>
<script>
if (Auth.isLoggedIn()) window.location.href = '/dashboard';

document.getElementById('register-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const errEl = document.getElementById('error-msg');
  const sucEl = document.getElementById('success-msg');
  btn.textContent = 'Creating account...'; btn.disabled = true;
  errEl.style.display = 'none'; sucEl.style.display = 'none';
  try {
    const data = await API.post('/register', {
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
      company: document.getElementById('company').value,
      phone: document.getElementById('phone').value
    });
    localStorage.setItem('tendrai_token', data.token);
    localStorage.setItem('tendrai_user', JSON.stringify(data.user));
    sucEl.textContent = 'Account created! Redirecting to dashboard...';
    sucEl.style.display = 'block';
    setTimeout(() => window.location.href = '/dashboard', 1500);
  } catch(err) {
    errEl.textContent = err.message; errEl.style.display = 'block';
    btn.textContent = 'Create Free Account'; btn.disabled = false;
  }
});
</script>
</body>
</html>
