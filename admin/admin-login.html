<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — TendRAI</title>
<link rel="stylesheet" href="/css/style.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;
background:radial-gradient(ellipse at 30% 40%,rgba(99,102,241,0.1) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(34,211,238,0.06) 0%,transparent 50%)}
.auth-card{width:100%;max-width:420px;padding:2.5rem}
</style>
</head>
<body>
<div class="glass-card auth-card">
  <div style="text-align:center;margin-bottom:2rem">
    <div style="width:56px;height:56px;background:linear-gradient(135deg,var(--secondary),var(--accent));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;font-weight:800;font-family:'Syne',sans-serif;color:white;margin:0 auto 1rem">⚙</div>
    <h1 style="font-size:1.4rem;font-weight:800">Admin Panel</h1>
    <p style="color:var(--text-muted);font-size:0.85rem;margin-top:0.3rem">TendRAI Administration</p>
  </div>
  <div id="error-msg" class="alert alert-error" style="display:none"></div>
  <form id="admin-login-form">
    <div class="form-group"><label class="form-label">Admin Email</label><input type="email" id="email" class="form-input" placeholder="admin@tendrai.in" required></div>
    <div class="form-group"><label class="form-label">Password</label><input type="password" id="password" class="form-input" placeholder="Admin password" required></div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem;background:linear-gradient(135deg,var(--secondary),var(--accent))" id="submit-btn">Sign In to Admin</button>
  </form>
  <p style="text-align:center;margin-top:1.5rem;font-size:0.8rem;color:var(--text-muted)">
    <a href="/" style="color:var(--text-muted)">← Back to website</a>
  </p>
  <div style="margin-top:1.5rem;padding:0.75rem;background:rgba(99,102,241,0.06);border:1px solid rgba(99,102,241,0.15);border-radius:8px;font-size:0.78rem;color:var(--text-muted)">
    Default credentials:<br>Email: admin@tendrai.in<br>Password: admin@tendrai2024
  </div>
</div>
<script src="/js/app.js"></script>
<script>
if (AdminAuth.isLoggedIn()) window.location.href = '/admin';
document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const errEl = document.getElementById('error-msg');
  btn.textContent = 'Signing in...'; btn.disabled = true; errEl.style.display = 'none';
  try {
    const data = await fetch('/api/admin/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
    }).then(r => r.json());
    if (!data.token) throw new Error(data.message || 'Login failed');
    localStorage.setItem('tendrai_admin_token', data.token);
    localStorage.setItem('tendrai_admin', JSON.stringify(data.admin));
    window.location.href = '/admin';
  } catch(err) {
    errEl.textContent = err.message; errEl.style.display = 'block';
    btn.textContent = 'Sign In to Admin'; btn.disabled = false;
  }
});
</script>
</body>
</html>
